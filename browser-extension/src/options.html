<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RabAiMind 设置</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f23; color: #e2e8f0; min-height: 100vh; padding: 32px; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 700; color: white; margin-bottom: 8px; }
  .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 32px; }
  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card-title { font-size: 15px; font-weight: 600; color: white; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
  input, select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #e2e8f0; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: #6366f1; }
  .hint { font-size: 11px; color: #64748b; margin-top: 4px; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
  .btn-primary:hover { box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
  .btn-success { background: #10b981; color: white; }
  .status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
  .status.show { display: block; }
  .status.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .status.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 24px 0; }
  code { background: rgba(99,102,241,0.2); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: #a5b4fc; }
</style>
</head>
<body>
<div class="container">
  <h1>⚙️ RabAiMind 扩展设置</h1>
  <p class="subtitle">配置 API 服务器和认证信息</p>

  <div class="card">
    <div class="card-title">🔗 API 配置</div>

    <div class="form-group">
      <label>API 服务器地址</label>
      <input type="url" id="apiUrl" placeholder="http://localhost:8003" value="http://localhost:8003">
      <p class="hint">RabAiMind API 服务地址，末尾不要加 <code>/</code></p>
    </div>

    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="rabai_xxxxxxxxxxxx">
      <p class="hint">在 RabAiMind 后台或 <code>POST /api/v1/zapier/api-keys</code> 创建</p>
    </div>

    <button class="btn btn-success" onclick="testConnection()">🧪 测试连接</button>
    <div id="testStatus" class="status"></div>
  </div>

  <div class="card">
    <div class="card-title">⚡ 行为设置</div>

    <div class="form-group">
      <label>自动提交生成</label>
      <select id="autoSubmit">
        <option value="false">否（每次弹出确认）</option>
        <option value="true">是（选中文字后直接提交）</option>
      </select>
      <p class="hint">启用后无需点击 popup，直接生成 PPT</p>
    </div>
  </div>

  <button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button>
  <div id="saveStatus" class="status"></div>

  <hr class="divider">

  <div class="card">
    <div class="card-title">📖 使用说明</div>
    <ol style="padding-left: 20px; color: #94a3b8; font-size: 13px; line-height: 2;">
      <li>在网页中<strong style="color:#e2e8f0">选中文本</strong>，浮动按钮出现后点击「用 AI 生成 PPT」</li>
      <li>或<strong style="color:#e2e8f0">右键选中内容</strong>，选择「用 RabAiMind 生成 PPT」</li>
      <li>或点击浏览器右上角扩展图标，手动输入内容</li>
      <li>配置好 API 后，PPT 会在后台自动生成，完成后可下载</li>
    </ol>
  </div>
</div>

<script>
async function loadSettings() {
  const data = await chrome.storage.local.get([
    "rabaimind_api_url", "rabaimind_api_key", "rabaimind_auto_submit"
  ]);
  document.getElementById("apiUrl").value = data.rabaimind_api_url || "http://localhost:8003";
  document.getElementById("apiKey").value = data.rabaimind_api_key || "";
  document.getElementById("autoSubmit").value = data.rabaimind_auto_submit ? "true" : "false";
}

async function saveSettings() {
  const apiUrl = document.getElementById("apiUrl").value.trim().replace(/\/$/, "");
  const apiKey = document.getElementById("apiKey").value.trim();
  const autoSubmit = document.getElementById("autoSubmit").value === "true";

  await chrome.storage.local.set({ rabaimind_api_url: apiUrl, rabaimind_api_key: apiKey, rabaimind_auto_submit: autoSubmit });

  const el = document.getElementById("saveStatus");
  el.className = "status success show";
  el.textContent = "✅ 设置已保存";
  setTimeout(() => el.classList.remove("show"), 3000);
}

async function testConnection() {
  const apiUrl = document.getElementById("apiUrl").value.trim().replace(/\/$/, "");
  const apiKey = document.getElementById("apiKey").value.trim();

  const el = document.getElementById("testStatus");
  el.className = "status show";
  el.textContent = "🧪 测试连接中...";

  try {
    const headers = { "Content-Type": "application/json" };
    if (apiKey) headers["X-API-Key"] = apiKey;

    const resp = await fetch(`${apiUrl}/api/v1/ppt/health`, { headers, method: "GET" });
    if (resp.ok) {
      const data = await resp.json();
      el.className = "status success show";
      el.textContent = `✅ 连接成功！服务状态: ${data.status || "healthy"}`;
    } else {
      el.className = "status error show";
      el.textContent = `❌ 连接失败 (HTTP ${resp.status})`;
    }
  } catch (err) {
    el.className = "status error show";
    el.textContent = `❌ 无法连接: ${err.message}`;
  }
}

document.addEventListener("DOMContentLoaded", loadSettings);
</script>
</body>
</html>
