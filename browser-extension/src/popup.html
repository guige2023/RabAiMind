<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RabAiMind Quick PPT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    width: 360px;
    min-height: 200px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
    color: #e2e8f0;
    padding: 16px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .logo {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .title { font-size: 15px; font-weight: 700; color: white; }
  .subtitle { font-size: 11px; color: #94a3b8; margin-top: 2px; }

  .source-info {
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
    font-size: 12px;
  }

  .source-info .label { color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .source-info .value { color: #e2e8f0; line-height: 1.4; max-height: 60px; overflow: hidden; text-overflow: ellipsis; }

  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  select, input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input:focus { border-color: #6366f1; }

  .btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    box-shadow: 0 4px 12px rgba(99,102,241,0.4);
  }

  .btn-primary:hover { box-shadow: 0 6px 16px rgba(99,102,241,0.5); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #94a3b8;
    margin-top: 8px;
  }

  .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }

  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .status {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    display: none;
  }

  .status.loading { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; display: block; }
  .status.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; display: block; }
  .status.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: block; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(165,180,252,0.3);
    border-top-color: #a5b4fc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 12px 0; }

  .task-link { color: #a5b4fc; word-break: break-all; font-size: 11px; }
  .task-link a { color: inherit; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">📊</div>
  <div>
    <div class="title">RabAiMind</div>
    <div class="subtitle">AI PPT 生成</div>
  </div>
</div>

<div class="source-info" id="sourceInfo">
  <div class="label">📌 内容来源</div>
  <div class="value" id="sourceText">正在加载...</div>
</div>

<div class="form-group">
  <label>场景</label>
  <select id="scene">
    <option value="business">商务汇报</option>
    <option value="academic">学术演讲</option>
    <option value="marketing">营销推广</option>
    <option value="general" selected>通用场景</option>
  </select>
</div>

<div class="form-group">
  <label>风格</label>
  <select id="style">
    <option value="professional" selected>专业简洁</option>
    <option value="creative">创意活力</option>
    <option value="minimal">简约清新</option>
    <option value="bold">大胆醒目</option>
  </select>
</div>

<button class="btn btn-primary" id="generateBtn" onclick="generatePPT()">
  🚀 一键生成 PPT
</button>

<button class="btn btn-secondary" onclick="openSettings()">
  ⚙️ 设置 API
</button>

<div class="status" id="statusBox"></div>

<script src="popup.js"></script>
</body>
</html>
