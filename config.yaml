# RabAi Mind AI PPT 生成平台配置文件

## 火山引擎 API 配置 (Volcengine)
volcano:
  api_key: "1d91e7e0-5761-4edb-a348-bc0b8b86affb"
  # 文本生成模型 - 火山引擎方舟
  text_model: "ep-20260303221115-dk4rt"
  # 图片生成模型 - 火山引擎方舟
  image_model: "ep-20260314123401-jwqhn"
  # API 端点 - 火山引擎方舟 (北京区域)
  endpoint: "https://ark.cn-beijing.volces.com/api/v3"
  # 超时配置
  timeout: 120

## MCP 服务配置
mcp:
  host: "0.0.0.0"
  port: 8080
  # mcp-server-okppt 路径
  okppt_server_path: "/usr/local/bin/mcp-server-okppt"
  # 允许的请求大小
  max_request_size: 10485760  # 10MB
  # 心跳间隔
  heartbeat_interval: 30

## Web 服务配置
web:
  host: "0.0.0.0"
  port: 8000
  # CORS 允许的源
  cors_origins:
    - "*"
  # 文件上传大小限制
  max_upload_size: 52428800  # 50MB
  # 异步任务队列
  task_queue_backend: "memory"  # memory/redis
  # Redis 配置 (可选)
  redis:
    host: "localhost"
    port: 6379
    db: 0

## PPT 生成参数配置
ppt:
  # 默认页面尺寸 (宽 x 高, 单位: 像素)
  default_size:
    width: 1600
    height: 900
  # 默认页面比例
  default_aspect_ratio: "16:9"
  # 输出格式
  output_formats:
    - pptx
    - pdf
    - images
  # 模板配置
  template:
    default: "default"
    path: "./templates"
  # SVG 配置
  svg:
    default_viewbox: "0 0 1600 900"
    embed_images: true
    optimize_paths: true

## Agent 配置
agents:
  # 总调度 Agent
  coordinator:
    max_steps: 30
    timeout: 600
  # 质量管控 Agent
  quality:
    svg_schema_path: "./schemas/svg_schema.json"
    pptx_validator: "libreoffice"
  # 火山云内容 Agent
  volcano:
    text_max_tokens: 32000
    image_max_size: 2048
  # PPT 优化 Agent
  optimizer:
    compression_enabled: true
    compress_quality: 80

## 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/rabai_mind.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

## OSS 配置 (可选)
oss:
  enabled: false
  endpoint: "https://oss-cn-beijing.aliyuncs.com"
  bucket: "rabai-mind-ppt"
  access_key: "${OSS_ACCESS_KEY}"
  secret_key: "${OSS_SECRET_KEY}"
