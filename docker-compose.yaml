# RabAi Mind Docker Compose 配置
#
# 使用方法:
#   开发环境: docker-compose up -d
#   生产环境: docker-compose -f docker-compose.yaml up -d --build
#   查看日志: docker-compose logs -f
#   停止服务: docker-compose down

version: '3.8'

services:
  # ==================== Redis 缓存/队列 ====================
  redis:
    image: redis:7-alpine
    container_name: rabai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== API 服务 ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rabai-api
    ports:
      - "8000:8000"
    environment:
      # 火山引擎配置 (必填)
      - VOLCANO_API_KEY=${VOLCANO_API_KEY:-}
      - VOLCANO_SECRET=${VOLCANO_SECRET:-}
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      # OSS 配置 (可选)
      - OSS_ENDPOINT=${OSS_ENDPOINT:-}
      - OSS_BUCKET=${OSS_BUCKET:-}
      - OSS_ACCESS_KEY=${OSS_ACCESS_KEY:-}
      - OSS_SECRET_KEY=${OSS_SECRET_KEY:-}
      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # 持久化输出文件
      - rabai-output:/app/output
      # 模板文件
      - ./templates:/app/templates
      # 日志文件
      - rabai-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rabai-network

  # ==================== MCP 服务 ====================
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rabai-mcp
    ports:
      - "8080:8080"
    command: python mcp_server_optimized.py --port 8080
    environment:
      - VOLCANO_API_KEY=${VOLCANO_API_KEY:-}
      - VOLCANO_SECRET=${VOLCANO_SECRET:-}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - rabai-output:/app/output
      - rabai-logs:/app/logs
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - rabai-network

  # ==================== Worker 服务 (可选) ====================
  # 用于处理异步任务
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rabai-worker
    command: python -m worker
    environment:
      - VOLCANO_API_KEY=${VOLCANO_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - rabai-output:/app/output
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - rabai-network

# ==================== 网络 ====================
networks:
  rabai-network:
    driver: bridge

# ==================== 卷 ====================
volumes:
  redis-data:
    driver: local
  rabai-output:
    driver: local
  rabai-logs:
    driver: local
